<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Admin-Panel</title>
    <link rel="stylesheet" href="../css/style.scss">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../icons/favicon.ico">
</head>
<body>

<nav class="navbar admin">
    <div class="content">
        <button id="backButton" class="back-btn">Zurück</button>
        <div class="selection active" data-tab="fill">Füllstände</div>
        <div class="line"></div>
        <div class="selection" data-tab="settings">Einstellungen</div>
        <button id="backButton" style="opacity: 0; pointer-events: none;" class="back-btn">Zurück</button>
    </div>
</nav>

<main class="admin-wrapper">

    <!-- Füllstände -->
    <section class="admin-tab active" id="tab-fill">
        <h2>Flüssigkeitsstände</h2>
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
            <button id="sortToggle" class="sort-btn">🔽 Sortierung: Absteigend</button>
            <button id="refillAllBtn" class="save-btn">🔄 Alle auffüllen</button>
        </div>
        <div class="liquid-list" id="liquidList"></div>
    </section>

    <!-- Einstellungen -->
    <section class="admin-tab" id="tab-settings">
        <h2>PIN-Einstellungen</h2>
        <div class="pin-settings">
            <label for="oldAlcoholPin">Alter Alkohol-PIN:</label>
            <input type="password" id="oldAlcoholPin" maxlength="4" placeholder="****">

            <label for="newAlcoholPin">Neuer Alkohol-PIN:</label>
            <input type="password" id="newAlcoholPin" maxlength="4" placeholder="****">

            <button id="savePinBtn" class="save-btn">Speichern</button>
        </div>
        <p id="pinStatus" class="status-msg"></p>

        <h2 style="margin-top: 32px;">Pumpen initialisieren</h2>
        <p style="opacity: 0.8; margin-bottom: 16px;">
            Button gedrückt halten, damit die jeweilige Pumpe fördert. Beim Loslassen stoppt sie.
        </p>

        <div id="pumpPrimeGrid" class="pump-prime-grid"></div>
        <p id="pumpPrimeStatus" class="status-msg"></p>
    </section>

    <button id="flushButton" class="flush-btn">💧 Alle Pumpen spülen</button>
</main>

<script>
    // Tab-Navigation
    document.querySelectorAll(".selection").forEach(sel => {
        sel.addEventListener("click", () => {
            document.querySelectorAll(".selection").forEach(s => s.classList.remove("active"));
            sel.classList.add("active");
            document.querySelectorAll(".admin-tab").forEach(tab => tab.classList.remove("active"));
            document.getElementById("tab-" + sel.dataset.tab).classList.add("active");
        });
    });

    // Globale Variablen
    const list = document.getElementById("liquidList");
    const sortBtn = document.getElementById("sortToggle");
    const refillAllBtn = document.getElementById("refillAllBtn");
    let ascending = false;
    let ingredients = [];

    const pumpPrimeGrid = document.getElementById("pumpPrimeGrid");
    const pumpPrimeStatus = document.getElementById("pumpPrimeStatus");

    const PUMP_COUNT = 16;
    const pumpStates = new Map();

    function setPumpStatus(message, isError = false) {
        if (!pumpPrimeStatus) return;
        pumpPrimeStatus.textContent = message;
        pumpPrimeStatus.style.color = isError ? "#ff6666" : "#a678ff";
    }

    function getPumpState(pumpId) {
        if (!pumpStates.has(pumpId)) {
            pumpStates.set(pumpId, {
                running: false,
                starting: false,
                stopping: false
            });
        }
        return pumpStates.get(pumpId);
    }

    async function startPump(pumpId, buttonEl) {
        const state = getPumpState(pumpId);
        if (state.running || state.starting) return;

        state.starting = true;
        buttonEl.classList.add("active");

        try {
            const res = await fetch(`http://127.0.0.1:5000/pump/${pumpId}/start`, {
                method: "POST"
            });

            if (!res.ok) {
                throw new Error(`Start fehlgeschlagen für Pumpe ${pumpId}`);
            }

            state.running = true;
            setPumpStatus(`Pumpe ${pumpId} läuft...`);
        } catch (err) {
            console.error(err);
            buttonEl.classList.remove("active");
            setPumpStatus(`Pumpe ${pumpId} konnte nicht gestartet werden.`, true);
        } finally {
            state.starting = false;
        }
    }

    async function stopPump(pumpId, buttonEl) {
        const state = getPumpState(pumpId);

        if (state.starting) {
            const waitUntil = Date.now() + 1500;
            while (state.starting && Date.now() < waitUntil) {
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        }

        if ((!state.running && !state.starting) || state.stopping) {
            buttonEl.classList.remove("active");
            return;
        }

        state.stopping = true;

        try {
            const res = await fetch(`http://127.0.0.1:5000/pump/${pumpId}/stop`, {
                method: "POST"
            });

            if (!res.ok) {
                throw new Error(`Stop fehlgeschlagen für Pumpe ${pumpId}`);
            }

            state.running = false;
            setPumpStatus(`Pumpe ${pumpId} gestoppt.`);
        } catch (err) {
            console.error(err);
            setPumpStatus(`Pumpe ${pumpId} konnte nicht gestoppt werden.`, true);
        } finally {
            state.stopping = false;
            buttonEl.classList.remove("active");
        }
    }

    function bindHoldPumpButton(buttonEl, pumpId) {
        let pressed = false;

        const pressStart = async (event) => {
            event.preventDefault();
            if (pressed) return;
            pressed = true;
            await startPump(pumpId, buttonEl);
        };

        const pressEnd = async () => {
            if (!pressed) return;
            pressed = false;
            await stopPump(pumpId, buttonEl);
        };

        buttonEl.addEventListener("pointerdown", pressStart);
        buttonEl.addEventListener("pointerup", pressEnd);
        buttonEl.addEventListener("pointerleave", pressEnd);
        buttonEl.addEventListener("pointercancel", pressEnd);

        window.addEventListener("mouseup", pressEnd);
        window.addEventListener("touchend", pressEnd);
    }

    function renderPumpPrimeButtons() {
        if (!pumpPrimeGrid) return;

        pumpPrimeGrid.innerHTML = "";

        for (let pumpId = 1; pumpId <= PUMP_COUNT; pumpId++) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "pump-hold-btn";
            btn.textContent = `Pumpe ${pumpId}`;
            btn.setAttribute("data-pump-id", pumpId);

            bindHoldPumpButton(btn, pumpId);
            pumpPrimeGrid.appendChild(btn);
        }
    }

    async function stopAllRunningPumps() {
        const stopPromises = [];

        document.querySelectorAll(".pump-hold-btn").forEach(btn => {
            btn.classList.remove("active");
        });

        for (let pumpId = 1; pumpId <= PUMP_COUNT; pumpId++) {
            const state = getPumpState(pumpId);
            if (state.running || state.starting) {
                stopPromises.push(
                    fetch(`http://127.0.0.1:5000/pump/${pumpId}/stop`, {
                        method: "POST"
                    }).catch(err => console.error(`Stop Fehler Pumpe ${pumpId}:`, err))
                );
                state.running = false;
                state.starting = false;
                state.stopping = false;
            }
        }

        await Promise.allSettled(stopPromises);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) stopAllRunningPumps();
    });

    window.addEventListener("beforeunload", () => {
        stopAllRunningPumps();
    });
    // Zutaten aus Backend laden
    async function loadIngredients() {
        try {
            console.log("called")
            const res = await fetch("http://127.0.0.1:5000/api/ingredients");
            if (!res.ok) throw new Error("Fehler beim Abrufen der Zutaten");
            ingredients = await res.json();
            renderIngredients();
        } catch (err) {
            console.error(err);
            list.innerHTML = `<p style="color:#ff6666;text-align:center;">Fehler beim Laden der Zutaten.</p>`;
        }
    }

    // Zutatenliste rendern
    function renderIngredients() {
        list.innerHTML = "";
        const normalized = ingredients.map(i => ({
            id: i.ingredient_id ?? i.id ?? 0,
            name: i.ingredient_name ?? i.name ?? "Unbekannt",
            current: i.current_level ?? i.level_ml ?? 0,
            max: i.max_level ?? i.max_level_ml ?? 2000,
            isLiquid: i.is_liquid ?? 0
        }));

        const sorted = [...normalized].sort((a, b) =>
            ascending ? a.current - b.current : b.current - a.current
        );

        sorted.forEach(i => {
            if (i.isLiquid){
                console.log(i.max, i.name, i.isLiquid)
                const percent = Math.min(100, Math.round((i.current / i.max) * 100));
                const el = document.createElement("div");
                el.classList.add("liquid-item");

                el.innerHTML = `
    <span class="liquid-name">${i.name}</span>
    <div class="liquid-bar" style="--after-text: '${i.current}/${i.max} ml';">
        <div class="fill" style="width:${percent}%;"></div>
    </div>
    <span class="liquid-percent">${percent}%</span>
    <span class="liquid-percent">${i.max} ml</span>
    <div style="display: flex; gap: 16px; margin-top: 12px;">
        <button class="refill-btn" data-id="${i.id}">➕ Nachfüllen</button>
        <button class="set-btn" data-id="${i.id}">✏️ Setzen</button>
    </div>
`;
                list.appendChild(el);
            }
        });

        // Buttons für Nachfüllen und Setzen aktivieren
        list.querySelectorAll(".refill-btn").forEach(btn => {
            btn.addEventListener("click", () => refillIngredient(parseInt(btn.dataset.id)));
        });
        list.querySelectorAll(".set-btn").forEach(btn => {
            btn.addEventListener("click", () => setIngredientLevel(parseInt(btn.dataset.id)));
        });

        sortBtn.textContent = ascending
            ? "🔼 Sortierung: Aufsteigend"
            : "🔽 Sortierung: Absteigend";
    }

    // Nachfüllen einzelner Zutat
    async function refillIngredient(id) {
        const amount = await promptNumberDialog({
            title: "Nachfüllen",
            message: "Wie viel ml soll hinzugefügt werden?",
            type: "info",
            placeholder: "z.B. 250",
            min: 1,
            step: "1",
            confirmText: "Hinzufügen",
            cancelText: "Abbrechen"
        });

        if (amount === null) return; // User abgebrochen

        if (!amount || isNaN(amount) || amount <= 0) return notify({
            title: "Ungültige Eingabe",
            message: "Bitte eine gültige Menge größer 0 eingeben.",
            type: "error"
        });

        try {
            const res = await fetch("http://127.0.0.1:5000/api/ingredients/refill", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ingredient_id: id, amount: parseFloat(amount) })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Fehler beim Nachfüllen");
            notify({
                title: "Erfolg",
                message: `Zutat #${id} wurde um ${amount} ml aufgefüllt.`,
                type: "success"
            });

            await loadIngredients();
        } catch (err) {
            console.error(err);
            notify({
                title: "Nachfüllfehler",
                message: "Es konnte nicht Nachgefüllt werden.",
                type: "error"
            });
        }
    }

    // Setzen eines festen Levels
    async function setIngredientLevel(id) {
        const level = await promptNumberDialog({
            title: "Füllstand setzen",
            message: "Neuen Füllstand in ml eingeben:",
            type: "info",
            placeholder: "z.B. 1200",
            min: 0,
            step: "1",
            confirmText: "Setzen",
            cancelText: "Abbrechen"
        });

        if (level === null) return;

        if (!level || isNaN(level) || level < 0) return notify({
            title: "Ungültige Eingabe",
            message: "Bitte eine valide Menge eingeben.",
            type: "error"
        });
        try {
            const res = await fetch("http://127.0.0.1:5000/api/ingredients/set", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ingredient_id: id, level: parseFloat(level) })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Fehler beim Setzen des Levels");
            notify({
                title: "Zutatenmenge gesetzt",
                message: `Zutat #${id} auf ${level}ml gesetzt.`,
                type: "success"
            });
            await loadIngredients();
        } catch (err) {
            console.error(err);
            notify({
                title: "Ungültige Eingabe",
                message: "Fehler beim Setzen des Levels.",
                type: "error"
            });
        }
    }

    // Sortierung umschalten
    sortBtn.addEventListener("click", () => {
        ascending = !ascending;
        renderIngredients();
    });

    // Alle Zutaten auffüllen
    refillAllBtn.addEventListener("click", async () => {
        const ok = await confirmDialog({
            title: "Alle Zutaten auffüllen?",
            message: "Sollen wirklich alle Zutaten auf 2000 ml gesetzt werden?",
            type: "warning",
            confirmText: "Ja, auffüllen",
            cancelText: "Abbrechen"
        });
        if (!ok) return;

        try {
            const res = await fetch("http://127.0.0.1:5000/api/ingredients/refill_all", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ level: 2000 })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Fehler beim Auffüllen");
            notify({
                title: "Erfolgreich aufgefüllt",
                message: "Alle Zutaten wurden aufgefüllt.",
                type: "success"
            });
            ingredients = data.ingredients_status || [];
            renderIngredients();
        } catch (err) {
            console.error(err);
            notify({
                title: "Fehler bei Auffüllung",
                message: "Fehler beim Auffüllen der Zutaten.",
                type: "error"
            });
        }
    });

    // Flush-Button (Backend-Endpoint noch hinzufügen)
    document.getElementById("flushButton").addEventListener("click", async () => {
        notify({
            title: "Pumpenspülung",
            message: "Alle Pumpen werden gespült... (Backend-Endpoint fehlt noch)",
            type: "success"
        });
    });

    // PIN ändern
    document.getElementById("savePinBtn").addEventListener("click", async () => {
        const oldPinEl = document.getElementById("oldAlcoholPin");
        const newPinEl = document.getElementById("newAlcoholPin");
        const status = document.getElementById("pinStatus");

        const oldPin = (oldPinEl?.value || "").trim();
        const newPin = (newPinEl?.value || "").trim();

        if (oldPin.length !== 4 || isNaN(oldPin) || newPin.length !== 4 || isNaN(newPin)) {
            status.textContent = "Bitte alte und neue 4-stellige numerische PINs eingeben.";
            status.style.color = "#ff6666";
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:5000/api/change-pin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ old_pin: oldPin, new_pin: newPin })
            });
            const result = await response.json();

            if (!response.ok) {
                status.textContent = result.message || "Fehler beim Ändern des PINs.";
                status.style.color = "#ff6666";
                return;
            }

            status.textContent = "Neuer Alkohol-PIN gespeichert!";
            status.style.color = "#a678ff";
            oldPinEl.value = "";
            newPinEl.value = "";
        } catch (error) {
            status.textContent = "Verbindungsfehler zum Server.";
            status.style.color = "#ff6666";
        }
    });

    // Zurück zur Hauptseite
    document.getElementById("backButton").addEventListener("click", () => {
        window.location.href = "index.html";
    });



    // Initiales Laden
    renderPumpPrimeButtons();
    loadIngredients();
</script>


<!-- Alert Host / Container -->
<section
        class="app-alerts"
        id="alertHost"
        aria-live="polite"
        aria-relevant="additions removals"
></section>

<!-- Optional: Template (wenn ihr später JS nutzt, um Alerts zu klonen) -->
<template id="alertTemplate">
    <article class="app-alert app-alert--info" role="status">
        <div class="app-alert__content">
            <div class="app-alert__title">Alertname</div>
            <div class="app-alert__message">Alertmessage</div>
        </div>

        <button class="app-alert__close" type="button" aria-label="Alert schließen">
            ✕
        </button>
    </article>
</template>

<script src="../js/alerts.js"></script>
</body>
</html>
